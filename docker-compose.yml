name: codebase-intelligence

# ─── Shared configuration anchors ────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart-policy: &restart-policy
  restart: unless-stopped

services:

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    <<: *restart-policy
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: runtime
    image: codebase-intel/backend:latest
    container_name: ci_backend
    ports:
      - "8000:8000"
    environment:
      # App
      APP_ENVIRONMENT: development
      APP_DEBUG: "true"
      APP_LOG_LEVEL: INFO
      APP_CORS_ORIGINS: "http://localhost:3000"
      # Postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codebase_intel}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      # Repository Management
      REPO_CLONE_ROOT: /storage/repos
      REPO_CLONE_TIMEOUT: "300"
      REPO_GITHUB_TOKEN: ${REPO_GITHUB_TOKEN:-}
      # Repository Scanner
      SCANNER_MAX_FILE_SIZE_BYTES: "10485760"
      SCANNER_MAX_SCAN_DEPTH: "50"
      SCANNER_HASH_CHUNK_SIZE: "65536"
      SCANNER_DB_BATCH_SIZE: "500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      # Hot-reload during development: mount source code
      - ./backend:/app/backend:ro
      # Shared storage for cloned repositories
      - repo_storage:/storage/repos
    networks:
      - ci_network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    <<: *restart-policy
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: runtime
    image: codebase-intel/backend:latest
    container_name: ci_celery_worker
    command: celery -A backend.app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      APP_ENVIRONMENT: development
      APP_LOG_LEVEL: INFO
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codebase_intel}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REPO_CLONE_ROOT: /storage/repos
      REPO_CLONE_TIMEOUT: "300"
      REPO_GITHUB_TOKEN: ${REPO_GITHUB_TOKEN:-}
      # Repository Scanner
      SCANNER_MAX_FILE_SIZE_BYTES: "10485760"
      SCANNER_MAX_SCAN_DEPTH: "50"
      SCANNER_HASH_CHUNK_SIZE: "65536"
      SCANNER_DB_BATCH_SIZE: "500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend:ro
      - repo_storage:/storage/repos
    networks:
      - ci_network
    logging: *default-logging

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    <<: *restart-policy
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: runtime
    image: codebase-intel/frontend:latest
    container_name: ci_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - ci_network
    logging: *default-logging

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    <<: *restart-policy
    image: postgres:16-alpine
    container_name: ci_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codebase_intel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ci_network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codebase_intel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    <<: *restart-policy
    image: redis:7-alpine
    container_name: ci_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ci_network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    <<: *restart-policy
    image: neo4j:5.21-community
    container_name: ci_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_PLUGINS: '[]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
      NEO4J_server_default__listen__address: 0.0.0.0
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ci_network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Qdrant ────────────────────────────────────────────────────────────────
  qdrant:
    <<: *restart-policy
    image: qdrant/qdrant:v1.10.0
    container_name: ci_qdrant
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    environment:
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ci_network
    logging: *default-logging


# ─── Named volumes (persistent data) ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  qdrant_data:
    driver: local
  repo_storage:
    driver: local


# ─── Internal network ─────────────────────────────────────────────────────────
networks:
  ci_network:
    driver: bridge
