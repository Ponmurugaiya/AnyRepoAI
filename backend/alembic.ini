# Alembic configuration

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for prepended date/time
# timezone =

# Maximum number of revision files to maintain
# (default: None)
# max_length = 40

# Set to 'true' to run the environment during the 'revision' command
# Defaults to false
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be detected
# Defaults to false
# sourceless = false

# Version path separator; must match the platform
# Defaults to OS's path separator
# version_path_separator = :
# version_path_separator = ;

# The output encoding used when revision files are written
# output_encoding = utf-8

# Database URL placeholder; overridden at runtime via env.py
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/codebase_intel

[post_write_hooks]
# Post-write hooks (code formatters, linters)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
